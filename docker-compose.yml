services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beautyvote-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://beautyvote:beautyvote@db:5432/beautyvote
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_SECRET=${REFRESH_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - APP_NAME=${APP_NAME:-BeautyVote}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-BeautyVote <noreply@beautyvote.com>}
      - PAYSTACK_PUBLIC_KEY=${PAYSTACK_PUBLIC_KEY}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
      - FLUTTERWAVE_PUBLIC_KEY=${FLUTTERWAVE_PUBLIC_KEY}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY}
      - DEFAULT_CURRENCY=${DEFAULT_CURRENCY:-NGN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEB_APP_URL=${TELEGRAM_WEB_APP_URL}
      - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME}
      - TELEGRAM_SUPPORT_BOT_TOKEN=${TELEGRAM_SUPPORT_BOT_TOKEN}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID}
      - NEXT_PUBLIC_ENABLE_TURNSTILE=${NEXT_PUBLIC_ENABLE_TURNSTILE:-true}
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - ENABLE_FLUTTERWAVE=${ENABLE_FLUTTERWAVE:-true}
      - ENABLE_PAYSTACK=${ENABLE_PAYSTACK:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

  db:
    image: postgres:16-alpine
    container_name: beautyvote-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beautyvote
      POSTGRES_PASSWORD: beautyvote
      POSTGRES_DB: beautyvote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beautyvote -d beautyvote"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Caddy reverse proxy (uncomment if needed)
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: beautyvote-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - app

volumes:
  postgres_data:
  uploads:
