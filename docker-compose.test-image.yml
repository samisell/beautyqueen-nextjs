services:
  db:
    image: postgres:16-alpine
    container_name: beautyqueen-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beautyvote
      POSTGRES_PASSWORD: beautyvote
      POSTGRES_DB: beautyvote
    volumes:
      - beautyqueen_test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beautyvote -d beautyvote"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: beautyqueen-nextjs:prod
    container_name: beautyqueen-test-app
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - beautyqueen_test_uploads:/app/public/uploads

volumes:
  beautyqueen_test_postgres_data:
  beautyqueen_test_uploads:
